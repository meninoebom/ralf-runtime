<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ralf — Performance Console</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    background: #0a0a0a; color: #ccc;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 24px 24px 56px;
  }
  h1 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 2px; }
  .subtitle { font-size: 11px; color: #555; margin-bottom: 16px; }

  /* Header bar: scene picker, connection, save buttons */
  .header-bar {
    display: flex; gap: 12px; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap; justify-content: center;
    width: 100%; max-width: 1100px;
  }
  .header-bar .spacer { flex: 1; }

  .status-item { display: flex; gap: 6px; align-items: center; font-size: 11px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #333; display: inline-block;
  }
  .dot.connected { background: #4a4; }
  .dot.disconnected { background: #a44; }
  .dot.reconnecting { background: #aa4; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }

  button {
    font-family: inherit; font-size: 12px; padding: 8px 16px;
    border: 1px solid #333; border-radius: 4px; cursor: pointer;
    background: #1a1a1a; color: #ccc; transition: all 0.15s;
  }
  button:hover { background: #252525; border-color: #555; }

  .save-btn {
    background: #1a3a1a; border-color: #2a5a2a; color: #5c5;
    font-weight: 600; padding: 6px 14px; font-size: 11px;
    letter-spacing: 0.3px;
  }
  .save-btn:hover { background: #254025; border-color: #3a6a3a; }
  .save-btn.flash { background: #2a5a2a; color: #fff; }

  /* Quality / reading bars (used in signal strip detail panels + editor) */
  .bar-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 5px; font-size: 11px;
  }
  .bar-label { color: #888; min-width: 100px; }
  .bar-label.dim { color: #444; }
  .bar-bg {
    flex: 1; height: 6px; background: #1a1a1a;
    border-radius: 3px; overflow: hidden; margin: 0 8px;
  }
  .bar-bg.tall { height: 8px; }
  .bar-fill {
    height: 100%; background: #4a4; border-radius: 3px;
    transition: width 0.15s;
  }
  .bar-fill.dim { background: #333; }
  .bar-value { font-size: 10px; color: #555; width: 36px; text-align: right; font-variant-numeric: tabular-nums; }

  .active-badge {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .active-badge.on { background: #4a4; box-shadow: 0 0 6px rgba(68,170,68,0.5); }
  .active-badge.off { background: #2a2a2a; }

  .dancer-header { font-size: 12px; color: #5c5; margin: 8px 0 4px; }
  .dancer-header:first-child { margin-top: 0; }

  /* Act log */
  .log {
    font-size: 10px; line-height: 1.6; color: #666;
    max-height: 260px; overflow-y: auto;
  }
  .log-entry { white-space: nowrap; }
  .log-entry .addr { color: #7a7; }
  .log-entry .args { color: #77a; }
  .log-entry .ts { color: #444; }

  /* Info rows */
  .info-row {
    display: flex; justify-content: space-between; font-size: 11px;
    margin-bottom: 4px;
  }
  .info-label { color: #666; }
  .info-value { color: #ccc; }
  .info-value.green { color: #5c5; }

  /* Editor is the main content now */
  .editor-content {
    width: 100%; max-width: 1100px;
  }

  /* Section dividers between readings and intents */
  .editor-section-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
    color: #444; margin: 20px 0 10px; padding-bottom: 6px;
    border-bottom: 1px solid #1a1a1a;
  }
  .editor-section-label:first-child { margin-top: 4px; }

  .editor-group {
    background: #111; border: 1px solid #1e1e1e; border-radius: 6px;
    padding: 0; margin-bottom: 14px;
    transition: border-color 0.4s, box-shadow 0.4s;
    overflow: hidden;
  }
  .editor-group:hover { border-color: #2a2a2a; }
  .editor-group.active-glow {
    border-color: #3a6a3a; box-shadow: 0 0 12px rgba(68,170,68,0.25), inset 0 0 20px rgba(68,170,68,0.03);
  }
  .editor-group.scroll-highlight {
    border-color: #4a4; box-shadow: 0 0 16px rgba(68,170,68,0.4);
  }

  /* Reading card header */
  .reading-header {
    padding: 14px 18px 10px;
    border-bottom: 1px solid #1a1a1a;
    background: #0f0f0f;
  }
  .reading-name {
    background: transparent; border: 1px solid #333; color: #ddd;
    padding: 3px 8px; border-radius: 4px; font-size: 13px;
    font-family: inherit; margin-left: 4px;
  }
  .reading-name:focus { border-color: #4a4; outline: none; }
  .reading-footer {
    padding: 8px 18px; border-top: 1px solid #1a1a1a;
    display: flex; justify-content: flex-end;
  }
  .remove-reading-btn {
    background: transparent; border: 1px solid #533; color: #a66;
    padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .remove-reading-btn:hover { background: #331111; border-color: #844; color: #e88; }

  /* Two-column layout */
  .reading-columns {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    min-height: 80px;
  }
  @media (max-width: 800px) {
    .reading-columns {
      grid-template-columns: 1fr;
    }
    .reading-connector { display: none; }
  }

  .reading-col {
    padding: 16px 18px 18px;
  }
  .reading-col-qualities {
    background: #0f1114;
  }
  .reading-col-intents {
    background: #14110f;
  }

  /* Visual connector between columns */
  .reading-connector {
    width: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: linear-gradient(to right, #0f1114, #14110f);
  }
  .reading-connector::before {
    content: "";
    width: 2px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, #2a2a2a, transparent);
    position: absolute;
  }
  .reading-connector::after {
    content: "";
    width: 0;
    height: 0;
    border-left: 5px solid #2a2a2a;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    position: relative;
    left: 1px;
  }

  .reading-col-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #3a3a3a;
    margin-bottom: 12px;
  }

  .editor-group-title {
    font-size: 11px; color: #5c5; margin-bottom: 8px; font-weight: 600;
    letter-spacing: 0.3px;
  }
  .slider-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; font-size: 11px;
  }
  .slider-row label { color: #777; min-width: 120px; }
  .slider-row input[type="range"] {
    flex: 1; max-width: 200px; accent-color: #4a4;
    height: 4px; -webkit-appearance: none; appearance: none;
    background: #1a1a1a; border-radius: 2px; outline: none;
    cursor: pointer;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: #4a4; cursor: pointer;
    border: 2px solid #111;
    transition: background 0.15s;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb:hover {
    background: #5c5;
  }
  .slider-row input[type="range"]:active::-webkit-slider-thumb {
    background: #6d6;
  }
  .slider-row .slider-val { color: #666; width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
  .slider-row input[type="checkbox"] {
    accent-color: #4a4; width: 14px; height: 14px; cursor: pointer;
  }

  .intent-actions { margin-left: 16px; }
  .intent-header { font-size: 11px; color: #aaa; margin: 6px 0 2px; }
  .intent-mode { font-size: 10px; color: #666; margin-left: 8px; }

  .no-data { font-size: 11px; color: #444; font-style: italic; }

  /* Stale indicator */
  #stale-badge {
    display: none; font-size: 10px; color: #d4a; background: rgba(221,68,170,0.1);
    border: 1px solid #d4a; border-radius: 3px; padding: 1px 6px;
    margin-left: 6px; vertical-align: middle;
  }
  #stale-badge.visible { display: inline; }

  /* Stale dancer styling */
  .dancer-section.stale .bar-fill { opacity: 0.4; }
  .dancer-stale-label { color: #666; font-size: 10px; margin-left: 6px; }

  /* Reading editor enhancements */
  .reading-title-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .reading-title-row .editor-group-title { margin-bottom: 0; flex: 0 0 auto; }
  .remove-btn {
    font-family: inherit; font-size: 12px; background: none;
    border: 1px solid transparent; border-radius: 4px; color: #444;
    padding: 2px 7px; cursor: pointer; line-height: 1;
    transition: all 0.15s;
  }
  .remove-btn:hover { border-color: #a44; color: #a44; background: rgba(170,68,68,0.08); }
  .add-row {
    display: flex; gap: 8px; align-items: center; margin-top: 8px;
  }
  .add-row select {
    font-family: inherit; font-size: 11px; background: #0d0d0d;
    color: #666; border: 1px solid #222; border-radius: 4px;
    padding: 4px 8px; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .add-row select:hover { border-color: #333; color: #888; }
  .add-row select:focus { outline: none; border-color: #4a4; color: #888; }
  .add-btn {
    font-family: inherit; font-size: 11px; background: #151f15;
    border: 1px solid #2a3a2a; border-radius: 4px; color: #5c5;
    padding: 6px 14px; cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }
  .add-btn:hover { background: #1e2e1e; border-color: #3a5a3a; color: #6d6; }
  .quality-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; font-size: 11px;
  }
  .quality-row label { color: #777; min-width: 90px; font-size: 10px; }
  .quality-row input[type="range"] {
    flex: 1; max-width: 200px; accent-color: #4a4;
    height: 4px; -webkit-appearance: none; appearance: none;
    background: #1a1a1a; border-radius: 2px; outline: none;
    cursor: pointer;
  }
  .quality-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: #4a4; cursor: pointer;
    border: 2px solid #111;
    transition: background 0.15s;
  }
  .quality-row input[type="range"]::-webkit-slider-thumb:hover {
    background: #5c5;
  }
  .quality-row .slider-val { font-variant-numeric: tabular-nums; }
  .gate-row {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 8px; font-size: 11px; margin-left: 12px;
    padding-left: 8px; border-left: 2px solid #2a1f14;
    opacity: 0.7;
    transition: opacity 0.15s;
  }
  .gate-row:hover { opacity: 1; }
  .gate-row label { color: #8a6530; min-width: 40px; font-size: 10px; }
  .gate-row input[type="number"] {
    font-family: inherit; font-size: 11px; background: #0d0d0d;
    color: #b87333; border: 1px solid #2a1f14; border-radius: 4px;
    padding: 3px 6px; width: 60px;
    transition: border-color 0.15s;
  }
  .gate-row input[type="number"]:focus { outline: none; border-color: #b87333; color: #d4956a; }

  .trajectory-row {
    display: flex; align-items: center; gap: 6px;
    margin: 10px 0 8px; font-size: 11px;
    padding: 8px 10px; border-left: 2px solid #1a2a3a;
    background: #0d1118; border-radius: 0 4px 4px 0;
    opacity: 0.7; transition: opacity 0.15s;
  }
  .trajectory-row:hover { opacity: 1; }
  .trajectory-row .traj-label { color: #668; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }
  .trajectory-row label { color: #557; min-width: 40px; font-size: 10px; }
  .trajectory-row input[type="number"] {
    font-family: inherit; font-size: 11px; background: #0d0d0d;
    color: #6688bb; border: 1px solid #1a2a3a; border-radius: 4px;
    padding: 3px 6px; width: 60px;
    transition: border-color 0.15s;
  }
  .trajectory-row input[type="number"]:focus { outline: none; border-color: #6688bb; color: #88aade; }
  .trajectory-row .live-slope { font-size: 10px; color: #555; margin-left: auto; font-variant-numeric: tabular-nums; }

  .slope-display { font-size: 10px; color: #666; margin-left: 4px; font-variant-numeric: tabular-nums; }
  .slope-up { color: #5c5; }
  .slope-down { color: #c55; }
  .slope-flat { color: #555; }

  .info-icon {
    display: inline-block; font-size: 9px; color: #444;
    border: 1px solid #333; border-radius: 50%; width: 14px; height: 14px;
    text-align: center; line-height: 13px; cursor: help;
    margin-left: 6px; vertical-align: middle;
    transition: color 0.15s, border-color 0.15s;
  }
  .info-icon:hover { color: #888; border-color: #555; }
  .empty-hint {
    font-size: 10px; color: #3a3a3a; font-style: italic;
    margin: 10px 0; padding: 8px 12px;
    border: 1px dashed #1e1e1e; border-radius: 4px;
  }

  /* Template cards */
  .template-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px; margin: 8px 0;
  }
  .template-card {
    background: #111; border: 1px dashed #2a3a2a; border-radius: 6px;
    padding: 10px 12px; cursor: pointer;
    transition: all 0.15s;
  }
  .template-card:hover { border-color: #4a4; border-style: solid; background: #151f15; }
  .template-card .template-name {
    font-size: 11px; color: #5c5; font-weight: 600; margin-bottom: 4px;
  }
  .template-card .template-desc {
    font-size: 10px; color: #555; line-height: 1.4;
  }
  .empty-state {
    text-align: center; padding: 20px 16px;
  }
  .empty-state .empty-title {
    font-size: 11px; color: #555; margin-bottom: 12px;
  }

  /* Intent wiring on reading cards */
  .intent-wire-section {
    margin-top: 0; padding-top: 0; border-top: none;
  }
  .intent-wire-title {
    font-size: 9px; color: #555; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
  }
  .intent-wire {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 6px; font-size: 11px; padding: 6px 8px;
    border-radius: 4px; flex-wrap: wrap;
    transition: background 0.15s;
  }
  .intent-wire:hover { background: rgba(255,255,255,0.02); }
  .intent-wire .intent-name {
    color: #7a7; min-width: 80px; font-weight: 600;
    cursor: pointer; transition: color 0.15s;
  }
  .intent-wire .intent-name:hover { color: #5c5; text-decoration: underline; }
  .intent-wire select {
    font-family: inherit; font-size: 10px; background: #0d0d0d;
    color: #888; border: 1px solid #1e1e1e; border-radius: 4px;
    padding: 3px 6px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .intent-wire select:hover { border-color: #333; }
  .intent-wire select:focus { outline: none; border-color: #4a4; }
  .intent-wire input[type="number"] {
    font-family: inherit; font-size: 10px; background: #0d0d0d;
    color: #888; border: 1px solid #1e1e1e; border-radius: 4px;
    padding: 3px 6px; width: 50px;
    transition: border-color 0.15s;
  }
  .intent-wire input[type="number"]:focus { outline: none; border-color: #4a4; }
  .intent-wire label { color: #555; font-size: 10px; }

  /* Intent editor — action picker */
  .action-card {
    background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 5px;
    padding: 10px 12px; margin-bottom: 8px; margin-left: 4px;
    transition: border-color 0.15s;
  }
  .action-card:hover { border-color: #252525; }
  .action-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 11px;
  }
  .action-header .action-name { color: #7a7; font-weight: 600; letter-spacing: 0.2px; }
  .action-header .action-desc { color: #444; font-size: 10px; flex: 1; font-style: italic; }
  .action-header .action-pct {
    color: #888; font-size: 10px; min-width: 36px; text-align: right;
    font-variant-numeric: tabular-nums;
    background: #161616; padding: 2px 6px; border-radius: 3px;
  }
  .action-args { margin-left: 8px; margin-top: 6px; }
  .action-args .arg-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 10px;
  }
  .action-args .arg-row label { color: #555; min-width: 60px; }
  .action-args .arg-row select, .action-args .arg-row input {
    font-family: inherit; font-size: 10px; background: #111;
    color: #888; border: 1px solid #1e1e1e; border-radius: 4px;
    padding: 3px 6px;
    transition: border-color 0.15s;
  }
  .action-args .arg-row select:hover, .action-args .arg-row input:hover { border-color: #333; }
  .action-args .arg-row select:focus, .action-args .arg-row input:focus { outline: none; border-color: #4a4; }

  /* Intent card in Intents section */
  .intent-card { padding: 14px 18px; }
  .intent-card-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .intent-card-header .editor-group-title { margin-bottom: 0; flex: 0 0 auto; }
  .intent-name-input {
    font-family: inherit; font-size: 11px; background: #0d0d0d;
    color: #999; border: 1px solid #222; border-radius: 4px;
    padding: 4px 8px; max-width: 180px;
    transition: border-color 0.15s, color 0.15s;
  }
  .intent-name-input:focus { outline: none; border-color: #4a4; color: #ccc; }
  .intent-usage-badges {
    display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .intent-usage-badge {
    font-size: 9px; color: #666; background: #161616; border: 1px solid #222;
    border-radius: 3px; padding: 2px 6px; cursor: pointer;
    transition: all 0.15s;
  }
  .intent-usage-badge:hover { color: #5c5; border-color: #3a6a3a; }

  /* ─── Signal Strip (fixed bottom bar) ─── */
  .signal-strip {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 36px; background: #0f0f0f;
    border-top: 1px solid #222;
    display: flex; align-items: center; gap: 16px;
    padding: 0 16px; z-index: 100;
    font-size: 11px;
  }
  .signal-dancer {
    display: flex; align-items: center; gap: 5px;
    cursor: pointer; padding: 4px 8px; border-radius: 4px;
    transition: background 0.15s;
    position: relative;
  }
  .signal-dancer:hover { background: rgba(255,255,255,0.04); }
  .signal-dancer.expanded { background: rgba(68,170,68,0.08); }
  .signal-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #333; transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  .signal-dot.active {
    background: #4a4;
    box-shadow: 0 0 6px rgba(68,170,68,0.5);
    animation: pulse 2s infinite;
  }
  .signal-dot.stale {
    background: #aa4;
  }
  .signal-dancer-label { color: #666; font-size: 10px; }
  .signal-dancer.expanded .signal-dancer-label { color: #5c5; }

  .signal-acts {
    display: flex; align-items: center; gap: 5px;
    cursor: pointer; padding: 4px 8px; border-radius: 4px;
    transition: background 0.15s;
    position: relative;
  }
  .signal-acts:hover { background: rgba(255,255,255,0.04); }
  .signal-acts.expanded { background: rgba(119,119,170,0.08); }
  .signal-acts-label { color: #555; font-size: 10px; }
  .signal-acts-rate { color: #77a; font-size: 10px; font-variant-numeric: tabular-nums; }

  .signal-spacer { flex: 1; }
  .signal-conn {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px;
  }
  .signal-conn .dot { width: 6px; height: 6px; }
  .signal-conn-label { color: #555; }

  /* Inline-expand detail panels (grow upward from strip) */
  .detail-panel {
    position: absolute; bottom: 36px; left: 0;
    background: #111; border: 1px solid #222;
    border-radius: 6px 6px 0 0;
    padding: 12px; min-width: 280px; max-height: 320px;
    overflow-y: auto; z-index: 101;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
  }
  .detail-panel-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: #555; margin-bottom: 8px;
  }

  /* WS URL config (hidden by default, toggled by gear) */
  .ws-config {
    display: none; align-items: center; gap: 8px;
    margin-bottom: 12px; justify-content: center;
  }
  .ws-config.open { display: flex; }
  .gear-btn {
    background: none; border: none; color: #444; cursor: pointer;
    font-size: 14px; padding: 4px 8px; transition: color 0.15s;
  }
  .gear-btn:hover { color: #888; }
</style>
</head>
<body>

<h1>RALF</h1>
<div class="subtitle">interaction design console</div>

<div class="header-bar">
  <div class="status-item">
    <span class="dot" id="ws-dot"></span>
    <span id="ws-status">disconnected</span>
    <span id="stale-badge">stale</span>
  </div>
  <div class="status-item">
    <select id="scene-picker" style="font-family:inherit;font-size:11px;background:#111;color:#4a4;border:1px solid #333;border-radius:4px;padding:2px 6px;cursor:pointer;" onchange="switchScene(this.value)">
      <option value="">—</option>
    </select>
  </div>
  <button class="gear-btn" onclick="toggleWsConfig()" title="Connection settings">⚙</button>
  <div class="spacer"></div>
  <button class="save-btn" id="revert-btn" onclick="revertScene()">Revert</button>
  <button class="save-btn" id="save-btn" onclick="saveScene()">Save</button>
  <button class="save-btn" id="save-as-btn" onclick="saveSceneAs()">Save As…</button>
</div>

<div class="ws-config" id="ws-config">
  <input id="ws-url" type="text" value="ws://localhost:8765"
    style="font-family:inherit;font-size:11px;background:#111;color:#888;border:1px solid #333;border-radius:4px;padding:6px 10px;width:200px;">
  <button onclick="reconnect()" style="font-size:11px;padding:6px 12px;">Reconnect</button>
</div>

<!-- Editor is the main content -->
<div class="editor-content">
  <div class="editor-section-label">Readings <span class="info-icon" title="A reading combines qualities into a single signal that triggers intents">?</span></div>
  <div id="reading-editor"></div>
  <div class="editor-section-label">Intents <span class="info-icon" title="An intent defines what happens — the actions triggered when a reading activates">?</span></div>
  <div id="intent-editor"></div>
</div>

<!-- Signal strip (fixed bottom bar) -->
<div class="signal-strip" id="signal-strip">
  <span class="signal-acts-label" style="color:#444">no signal</span>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const MAX_ACT_LOG = 50;
const DEBOUNCE_MS = 100;

// ─── Reconnect backoff ──────────────────────────────────────────────────────
let reconnectDelay = 1000;
const MAX_RECONNECT_DELAY = 15000;
let reconnectAttempt = 0;

// ─── State ───────────────────────────────────────────────────────────────────
let ws = null;
let reconnectTimer = null;
let latestState = null;
let scene = null;
let frameCount = 0;
let lastFpsTime = performance.now();
let fps = 0;
let actTimestamps = [];
let actLogEntries = [];
let renderDirty = true;
let editorDirty = false;
let debounceTimer = null;
let manifest = null;
let lastStateTime = 0;
let lastMessageTime = 0;
let heartbeatInterval = null;

// Signal strip state
let expandedDancers = new Set();
let actsExpanded = false;
let stripDirty = true; // only rebuild strip HTML when structure changes

// ─── WebSocket ───────────────────────────────────────────────────────────────
function connect() {
  const url = document.getElementById("ws-url").value;
  if (ws && ws.readyState <= 1) ws.close();
  setConnectionStatus("reconnecting");

  ws = new WebSocket(url);

  ws.onopen = () => {
    setConnectionStatus("connected");
    clearTimeout(reconnectTimer);
    reconnectDelay = 1000;
    reconnectAttempt = 0;
    lastMessageTime = Date.now();
    send({ type: "getState" });
    send({ type: "getScene" });
    send({ type: "getManifest" });
    send({ type: "listScenes" });

    // Client-side heartbeat
    clearInterval(heartbeatInterval);
    heartbeatInterval = setInterval(() => {
      const now = Date.now();
      if (now - lastMessageTime > 15000) {
        ws.close();
      } else if (now - lastMessageTime > 10000) {
        send({ type: "ping" });
      }
    }, 10000);
  };

  ws.onmessage = (event) => {
    lastMessageTime = Date.now();
    try {
      const msg = JSON.parse(event.data);
      switch (msg.type) {
        case "state":
          lastStateTime = Date.now();
          document.getElementById("stale-badge").classList.remove("visible");
          latestState = msg;
          frameCount++;
          renderDirty = true;
          break;
        case "act":
          addAct(msg.address, msg.args || []);
          renderDirty = true;
          break;
        case "scene":
          scene = msg.scene;
          rebuildEditor();
          break;
        case "manifest":
          manifest = msg.manifest;
          if (scene) rebuildIntentEditor();
          break;
        case "sceneList":
          updateScenePicker(msg.scenes || []);
          break;
        case "ping":
          send({ type: "pong", name: "console" });
          break;
      }
    } catch (e) {
      console.error("WS parse error:", e);
    }
  };

  ws.onclose = () => {
    setConnectionStatus("disconnected");
    clearInterval(heartbeatInterval);
    document.getElementById("stale-badge").classList.remove("visible");
    reconnectAttempt++;
    reconnectTimer = setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
  };

  ws.onerror = (e) => { console.error("[console] WebSocket error:", e); };
}

function reconnect() {
  clearTimeout(reconnectTimer);
  connect();
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

function setConnectionStatus(status) {
  document.getElementById("ws-dot").className = "dot " + status;
  const label = status === "reconnecting" && reconnectAttempt > 0
    ? `reconnecting (attempt ${reconnectAttempt})…`
    : status;
  document.getElementById("ws-status").textContent = label;
}

function toggleWsConfig() {
  document.getElementById("ws-config").classList.toggle("open");
}

// ─── Act log ─────────────────────────────────────────────────────────────────
function addAct(address, args) {
  const now = Date.now();
  actTimestamps.push(now);
  const time = new Date(now).toLocaleTimeString("en-US", { hour12: false, fractionalSecondDigits: 1 });
  const argsStr = args.map(a => typeof a === "number" ? a.toFixed(2) : `"${a}"`).join(" ");
  actLogEntries.unshift({ time, address, argsStr });
  if (actLogEntries.length > MAX_ACT_LOG) actLogEntries.length = MAX_ACT_LOG;
}

function getActRate() {
  const now = Date.now();
  const cutoff = now - 1000;
  actTimestamps = actTimestamps.filter(t => t > cutoff);
  return actTimestamps.length;
}

// ─── Render loop ─────────────────────────────────────────────────────────────
function renderLoop() {
  requestAnimationFrame(renderLoop);
  // Stale detection runs every frame regardless of renderDirty
  const isStale = lastStateTime > 0 && ws && ws.readyState === WebSocket.OPEN
    && Date.now() - lastStateTime > 3000;
  if (isStale) {
    document.getElementById("stale-badge").classList.add("visible");
  }

  if (!renderDirty) return;
  renderDirty = false;

  // FPS calculation
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFpsTime = now;
  }

  if (latestState) {
    renderSignalStrip(latestState);
    updateEditorLive(latestState);
  }
}

// ─── Signal Strip ────────────────────────────────────────────────────────────
let lastStripDancerIds = [];

function renderSignalStrip(s) {
  const dancers = s.dancers || {};
  const dancerIds = Object.keys(dancers);

  // Check if strip structure changed (dancers added/removed)
  if (dancerIds.join(",") !== lastStripDancerIds.join(",")) {
    stripDirty = true;
    lastStripDancerIds = dancerIds;
  }

  // Rebuild HTML only when structure changes
  if (stripDirty) {
    rebuildStripHTML(dancerIds, dancers);
    stripDirty = false;
  }

  // Update values in-place every frame
  updateStripValues(dancerIds, dancers);
}

function rebuildStripHTML(dancerIds, dancers) {
  const strip = document.getElementById("signal-strip");
  let html = "";

  for (const id of dancerIds) {
    const expanded = expandedDancers.has(id);
    html += `<div class="signal-dancer${expanded ? ' expanded' : ''}" data-dancer-id="${id}" onclick="toggleDancerDetail('${id}')">`;
    html += `<span class="signal-dot" data-dot-id="${id}"></span>`;
    html += `<span class="signal-dancer-label">${id}</span>`;
    if (expanded) {
      const d = dancers[id];
      const quals = d ? (d.qualities || {}) : {};
      html += `<div class="detail-panel" onclick="event.stopPropagation()">`;
      html += `<div class="detail-panel-title">${id}<span data-stale-label="${id}"></span></div>`;
      for (const q of Object.keys(quals)) {
        html += `<div class="bar-row">
          <span class="bar-label" data-qlabel="${id}:${q}">${q}</span>
          <div class="bar-bg"><div class="bar-fill" data-qbar="${id}:${q}" style="width:0%"></div></div>
          <span class="bar-value" data-qval="${id}:${q}">0.00</span>
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  // Acts indicator
  html += `<div class="signal-acts${actsExpanded ? ' expanded' : ''}" onclick="toggleActsDetail()">`;
  html += `<span class="signal-acts-label">acts</span>`;
  html += `<span class="signal-acts-rate" id="strip-act-rate">0/s</span>`;
  if (actsExpanded) {
    html += `<div class="detail-panel" onclick="event.stopPropagation()" style="min-width:350px;right:0;left:auto;">`;
    html += `<div class="detail-panel-title">Acts Log</div>`;
    html += `<div class="log" id="strip-act-log"><span class="no-data">no acts yet</span></div>`;
    html += `</div>`;
  }
  html += `</div>`;

  html += `<div class="signal-spacer"></div>`;
  html += `<div class="signal-conn">`;
  html += `<span class="signal-conn-label" id="strip-fps">0 fps</span>`;
  html += `</div>`;

  strip.innerHTML = html;
}

function updateStripValues(dancerIds, dancers) {
  // Update dancer dots and detail panels in-place
  for (const id of dancerIds) {
    const d = dancers[id];
    if (!d) continue;
    const isStale = d.stale === true;
    const hasSignal = Object.values(d.qualities || {}).some(v => v > 0.01);
    const dot = document.querySelector(`[data-dot-id="${id}"]`);
    if (dot) {
      dot.className = "signal-dot" + (isStale ? " stale" : hasSignal ? " active" : "");
    }
    const staleLabel = document.querySelector(`[data-stale-label="${id}"]`);
    if (staleLabel) {
      staleLabel.innerHTML = isStale ? ' <span style="color:#aa4">(stale)</span>' : '';
    }

    // Update quality bars if expanded
    if (expandedDancers.has(id)) {
      const quals = d.qualities || {};
      for (const [q, v] of Object.entries(quals)) {
        const pct = Math.round(Math.max(0, Math.min(1, v)) * 100);
        const dim = v < 0.01;
        const bar = document.querySelector(`[data-qbar="${id}:${q}"]`);
        if (bar) {
          bar.style.width = pct + "%";
          bar.className = "bar-fill" + (dim ? " dim" : "");
        }
        const val = document.querySelector(`[data-qval="${id}:${q}"]`);
        if (val) val.textContent = v.toFixed(2);
        const label = document.querySelector(`[data-qlabel="${id}:${q}"]`);
        if (label) label.className = "bar-label" + (dim ? " dim" : "");
      }
    }
  }

  // Update acts rate + log
  const rateEl = document.getElementById("strip-act-rate");
  if (rateEl) rateEl.textContent = getActRate() + "/s";

  if (actsExpanded) {
    const logEl = document.getElementById("strip-act-log");
    if (logEl) {
      if (actLogEntries.length === 0) {
        logEl.innerHTML = '<span class="no-data">no acts yet</span>';
      } else {
        let html = "";
        for (const e of actLogEntries) {
          html += `<div class="log-entry"><span class="ts">${e.time}</span> <span class="addr">${e.address}</span> <span class="args">${e.argsStr}</span></div>`;
        }
        logEl.innerHTML = html;
      }
    }
  }

  // FPS
  const fpsEl = document.getElementById("strip-fps");
  if (fpsEl) fpsEl.textContent = fps + " fps";
}

function toggleDancerDetail(id) {
  if (expandedDancers.has(id)) {
    expandedDancers.delete(id);
  } else {
    expandedDancers.add(id);
  }
  stripDirty = true;
  renderDirty = true;
}

function toggleActsDetail() {
  actsExpanded = !actsExpanded;
  stripDirty = true;
  renderDirty = true;
}

// ─── Editor live updates ─────────────────────────────────────────────────────
function updateEditorLive(s) {
  // Update live quality values next to mix sliders
  const dancers = s.dancers || {};
  const dancerIds = Object.keys(dancers).filter(id => !id.startsWith("_"));
  const qualities = dancerIds.length > 0 ? (dancers[dancerIds[0]].qualities || {}) : {};
  const crowdQualities = dancers._crowd ? (dancers._crowd.qualities || {}) : {};
  const allQualities = { ...qualities, ...crowdQualities };

  document.querySelectorAll("[data-live-quality]").forEach(el => {
    const q = el.dataset.liveQuality;
    const v = allQualities[q];
    el.textContent = v !== undefined ? v.toFixed(2) : "—";
  });

  // Update reading active badges + card glow
  const readings = s.readings || [];
  const readingMap = {};
  for (const r of readings) readingMap[r.id] = r.active;
  document.querySelectorAll("[data-live-reading]").forEach(el => {
    const id = el.dataset.liveReading;
    const active = readingMap[id];
    el.className = "active-badge " + (active ? "on" : "off");
  });
  document.querySelectorAll("[data-reading-index]").forEach(card => {
    const ri = parseInt(card.dataset.readingIndex);
    const r = scene && scene.readings && scene.readings[ri];
    if (r && readingMap[r.id]) {
      card.classList.add("active-glow");
    } else {
      card.classList.remove("active-glow");
    }
  });

  // Update live slope displays in editor trajectory rows
  const slopeMap = {};
  for (const r of readings) {
    if (r.slope !== undefined) slopeMap[r.id] = r.slope;
  }
  document.querySelectorAll("[data-live-slope]").forEach(el => {
    const id = el.dataset.liveSlope;
    const slope = slopeMap[id];
    if (slope !== undefined && slope !== null) {
      const arrow = slope > 0.03 ? "↑" : slope < -0.03 ? "↓" : "→";
      const cls = slope > 0.03 ? "slope-up" : slope < -0.03 ? "slope-down" : "slope-flat";
      el.innerHTML = `<span class="${cls}">${arrow}${Math.abs(slope).toFixed(2)}</span>`;
    } else {
      el.textContent = "—";
    }
  });
}

function scrollToReadingCard(readingId) {
  const cards = document.querySelectorAll("[data-reading-index]");
  for (const card of cards) {
    const ri = parseInt(card.dataset.readingIndex);
    const r = scene && scene.readings && scene.readings[ri];
    if (r && r.id === readingId) {
      card.scrollIntoView({ behavior: "smooth", block: "center" });
      card.classList.add("scroll-highlight");
      setTimeout(() => card.classList.remove("scroll-highlight"), 1500);
      return;
    }
  }
}

function scrollToIntentCard(intentName) {
  const cards = document.querySelectorAll("[data-intent-name]");
  for (const card of cards) {
    if (card.dataset.intentName === intentName) {
      card.scrollIntoView({ behavior: "smooth", block: "center" });
      card.classList.add("scroll-highlight");
      setTimeout(() => card.classList.remove("scroll-highlight"), 1500);
      return;
    }
  }
}

// ─── Scene Editor ────────────────────────────────────────────────────────────
function rebuildEditor() {
  if (!scene) return;
  rebuildReadingEditor();
  rebuildIntentEditor();
}

const VALID_QUALITIES = [
  "velocity", "acceleration", "jerkiness", "energy", "spatial_extent",
  "contraction", "symmetry", "coherence", "verticality", "heading",
  "stillness", "periodicity", "groundedness", "synchrony", "contrast",
  "aggregate_energy"
];

let readingCounter = 0;

const READING_TEMPLATES = [
  {
    name: "Energy Burst",
    desc: "Trigger percussion when movement spikes",
    mix: { velocity: 1.0 },
    gate: { velocity: { above: 0.3 } },
    intent: { name: "energy-burst", mode: "edge" },
    actions: [{ action: "trigger/unmute_track", weight: 1, args: { track: "perc" } }]
  },
  {
    name: "Drop Out",
    desc: "Mute & filter down when dancers go still",
    mix: { stillness: 1.0 },
    gate: { stillness: { above: 0.3 } },
    intent: { name: "drop-out", mode: "continuous" },
    actions: [
      { action: "set/filter_cutoff", weight: 1, args: {} },
      { action: "trigger/mute_track", weight: 1, args: { track: "perc" } }
    ]
  },
  {
    name: "Sync Reward",
    desc: "Add reverb when dancers synchronize",
    mix: { synchrony: 1.0 },
    gate: { synchrony: { above: 0.4 } },
    intent: { name: "sync-reward", mode: "continuous" },
    actions: [{ action: "set/reverb_wet", weight: 1, args: {} }]
  },
  {
    name: "Calm Down",
    desc: "Lower volume as stillness increases",
    mix: { stillness: 1.0 },
    gate: { stillness: { above: 0.5 } },
    intent: { name: "calm-down", mode: "continuous" },
    actions: [{ action: "set/volume", weight: 1, args: {} }]
  }
];

function addReadingFromTemplate(template) {
  readingCounter++;
  if (!scene.readings) scene.readings = [];
  if (!scene.intents) scene.intents = {};

  const intentName = template.intent.name;
  const intentWire = { intent: intentName };
  if (template.intent.mode === "continuous") intentWire.mode = "continuous";

  scene.readings.push({
    id: `reading-${readingCounter}`,
    label: template.name,
    mix: { ...template.mix },
    gate: JSON.parse(JSON.stringify(template.gate || {})),
    intents: [Object.keys(intentWire).length === 1 ? intentName : intentWire]
  });

  scene.intents[intentName] = {
    pool: JSON.parse(JSON.stringify(template.actions)),
    deterministic: false
  };

  debounceSendScene("readings");
  rebuildEditor();
}

function rebuildReadingEditor() {
  const el = document.getElementById("reading-editor");
  const readings = scene.readings || [];

  for (const r of readings) {
    const m = (r.id || "").match(/^reading-(\d+)$/);
    if (m) readingCounter = Math.max(readingCounter, parseInt(m[1]));
  }

  let html = "";

  if (readings.length === 0) {
    html += `<div class="empty-state">`;
    html += `<div class="empty-title">No readings yet — start from a template or create a blank one</div>`;
    html += `<div class="template-grid">`;
    for (let ti = 0; ti < READING_TEMPLATES.length; ti++) {
      const t = READING_TEMPLATES[ti];
      html += `<div class="template-card" data-action="use-template" data-ti="${ti}">`;
      html += `<div class="template-name">${t.name}</div>`;
      html += `<div class="template-desc">${t.desc}</div>`;
      html += `</div>`;
    }
    html += `</div></div>`;
  }

  for (let ri = 0; ri < readings.length; ri++) {
    const r = readings[ri];
    html += `<div class="editor-group" data-reading-index="${ri}">`;

    html += `<div class="reading-header">`;
    html += `<div class="reading-title-row">`;
    html += `<span class="active-badge off" data-live-reading="${r.id || ri}"></span>`;
    html += `<span class="editor-group-title">Reading:</span>`;
    html += `<input type="text" class="reading-name" value="${r.id || ""}" data-ri="${ri}" data-type="reading-name" placeholder="reading id">`;
    html += `</div>`;
    html += `</div>`;

    html += `<div class="reading-columns">`;

    // Left column: Qualities
    html += `<div class="reading-col reading-col-qualities">`;
    html += `<div class="reading-col-label">Qualities</div>`;

    const mix = r.mix || {};
    const mixKeys = Object.keys(mix);
    if (mixKeys.length === 0) {
      html += `<div class="empty-hint">Pick a quality below to start sensing movement — try 'velocity'</div>`;
    }
    for (const q of mixKeys) {
      const w = mix[q];
      const val = typeof w === "number" ? w : (w && w.weight !== undefined ? w.weight : 0);
      html += `<div class="quality-row">
        <label>${q}</label>
        <input type="range" min="0" max="1" step="0.01" value="${val}"
          data-type="mix" data-ri="${ri}" data-quality="${q}">
        <span class="slider-val">${val.toFixed(2)}</span>
        <span class="bar-value" data-live-quality="${q}">—</span>
        <button class="remove-btn" data-ri="${ri}" data-quality="${q}" data-action="remove-quality" title="Remove quality">×</button>
      </div>`;

      const gc = r.gate && r.gate[q];
      html += `<div class="gate-row">
        <label title="The reading activates when this quality rises above this value">above</label>
        <input type="number" min="0" max="1" step="0.01" value="${gc && gc.above !== undefined ? gc.above : ""}"
          placeholder="—" data-type="gate-above" data-ri="${ri}" data-gq="${q}"
          title="The reading activates when ${q} rises above this value">
        <label title="The reading activates when this quality drops below this value">below</label>
        <input type="number" min="0" max="1" step="0.01" value="${gc && gc.below !== undefined ? gc.below : ""}"
          placeholder="—" data-type="gate-below" data-ri="${ri}" data-gq="${q}"
          title="The reading activates when ${q} drops below this value">
      </div>`;
    }

    // Trajectory config
    const traj = r.trajectory || {};
    html += `<div class="trajectory-row">
      <span class="traj-label">Trajectory</span>
      <label title="Number of frames to compute slope over (min 2)">window</label>
      <input type="number" min="2" step="1" value="${traj.window || ""}"
        placeholder="—" data-type="traj-window" data-ri="${ri}"
        title="Number of frames to compute slope over (min 2, empty = disabled)">
      <label title="Slope must be above this to activate">above</label>
      <input type="number" step="0.01" value="${traj.above !== undefined ? traj.above : ""}"
        placeholder="—" data-type="traj-above" data-ri="${ri}"
        title="Slope must be above this value to activate">
      <label title="Slope must be below this to activate">below</label>
      <input type="number" step="0.01" value="${traj.below !== undefined ? traj.below : ""}"
        placeholder="—" data-type="traj-below" data-ri="${ri}"
        title="Slope must be below this value to activate">
      <span class="live-slope" data-live-slope="${r.id}">—</span>
    </div>`;

    // Quality picker dropdown
    const usedQualities = new Set(mixKeys);
    const available = VALID_QUALITIES.filter(q => !usedQualities.has(q));
    if (available.length > 0) {
      html += `<div class="add-row">
        <select data-ri="${ri}" data-action="quality-picker">
          <option value="">+ add quality</option>
          ${available.map(q => `<option value="${q}">${q}</option>`).join("")}
        </select>
      </div>`;
    }

    html += `</div>`; // end qualities column

    // Connector
    html += `<div class="reading-connector"></div>`;

    // Right column: Intents
    html += `<div class="reading-col reading-col-intents">`;
    html += `<div class="reading-col-label">Intents</div>`;

    const intents = r.intents || [];
    if (intents.length === 0) {
      html += `<div class="empty-hint">Connect an intent to decide what happens when this reading activates</div>`;
    }
    for (let ii = 0; ii < intents.length; ii++) {
      const intent = intents[ii];
      const name = typeof intent === "string" ? intent : intent.intent;
      const mode = (typeof intent === "object" && intent.mode === "continuous") ? "continuous" : "";
      const above = (typeof intent === "object" && intent.above !== undefined) ? intent.above : "";
      const below = (typeof intent === "object" && intent.below !== undefined) ? intent.below : "";
      html += `<div class="intent-wire">
        <span class="intent-name" data-intent-link="${name}" onclick="scrollToIntentCard('${name}')" title="Jump to intent">${name}</span>
        <select data-ri="${ri}" data-ii="${ii}" data-action="intent-mode"
          title="One-shot: fires once when condition becomes true. Continuous: sends value every frame while condition is true">
          <option value="" ${mode === "" ? "selected" : ""}>one-shot</option>
          <option value="continuous" ${mode === "continuous" ? "selected" : ""}>continuous</option>
        </select>
        <label title="This intent only fires when the reading's value is above this threshold">above</label>
        <input type="number" min="0" max="1" step="0.01" value="${above}" placeholder="—"
          title="This intent only fires when the reading's value is above this threshold"
          data-ri="${ri}" data-ii="${ii}" data-action="intent-above">
        <label title="This intent only fires when the reading's value is below this threshold">below</label>
        <input type="number" min="0" max="1" step="0.01" value="${below}" placeholder="—"
          title="This intent only fires when the reading's value is below this threshold"
          data-ri="${ri}" data-ii="${ii}" data-action="intent-below">
        <button class="remove-btn" data-ri="${ri}" data-ii="${ii}" data-action="remove-intent" title="Remove intent">×</button>
      </div>`;
    }
    // Add intent dropdown
    const existingIntents = Object.keys(scene.intents || {});
    html += `<div class="add-row">
      <select data-ri="${ri}" data-action="add-intent">
        <option value="">+ add intent</option>
        ${existingIntents.map(n => `<option value="${n}">${n}</option>`).join("")}
        <option value="__new__">New Intent…</option>
      </select>
    </div>`;

    html += `</div>`; // end intents column
    html += `</div>`; // end reading-columns

    html += `<div class="reading-footer">`;
    html += `<button class="remove-reading-btn" data-ri="${ri}" data-action="remove-reading">Remove Reading</button>`;
    html += `</div>`;

    html += `</div>`; // end editor-group
  }

  // Add Reading button
  html += `<div style="margin-top:16px;">
    <button class="add-btn" style="padding:10px 20px; font-size:12px;" data-action="add-reading">+ Add Reading</button>
  </div>`;

  el.innerHTML = html;
  attachReadingListeners(el);
}

function attachReadingListeners(el) {
  el.querySelectorAll("input[type=range][data-type='mix']").forEach(input => {
    input.addEventListener("input", onReadingSlider);
  });
  el.querySelectorAll("input[data-type='reading-name']").forEach(input => {
    input.addEventListener("change", (e) => {
      const ri = parseInt(e.target.dataset.ri);
      const newId = e.target.value.trim().replace(/[^a-zA-Z0-9_-]/g, "-");
      if (!newId) { e.target.value = scene.readings[ri].id; return; }
      scene.readings[ri].id = newId;
      debounceSendScene("readings");
      rebuildReadingEditor();
      rebuildIntentEditor();
    });
  });
  el.querySelectorAll("input[data-type='gate-above'], input[data-type='gate-below']").forEach(input => {
    input.addEventListener("input", onGateInput);
  });
  el.querySelectorAll("input[data-type='traj-window'], input[data-type='traj-above'], input[data-type='traj-below']").forEach(input => {
    input.addEventListener("input", onTrajectoryInput);
  });
  el.querySelectorAll("select[data-action='quality-picker']").forEach(select => {
    select.addEventListener("change", (e) => {
      const q = e.target.value;
      if (!q) return;
      const ri = parseInt(e.target.dataset.ri);
      const r = scene.readings[ri];
      if (!r.mix) r.mix = {};
      r.mix[q] = 1.0;
      debounceSendScene("readings");
      rebuildReadingEditor();
    });
  });
  el.querySelectorAll("[data-action='remove-quality']").forEach(btn => {
    btn.addEventListener("click", (e) => {
      const ri = parseInt(e.target.dataset.ri);
      const q = e.target.dataset.quality;
      delete scene.readings[ri].mix[q];
      if (scene.readings[ri].gate) delete scene.readings[ri].gate[q];
      debounceSendScene("readings");
      rebuildReadingEditor();
    });
  });
  el.querySelectorAll("[data-action='remove-reading']").forEach(btn => {
    btn.addEventListener("click", (e) => {
      const ri = parseInt(e.target.dataset.ri);
      const name = scene.readings[ri].id || `reading ${ri}`;
      if (!confirm(`Remove reading "${name}"? This cannot be undone.`)) return;
      scene.readings.splice(ri, 1);
      debounceSendScene("readings");
      rebuildReadingEditor();
      rebuildIntentEditor();
    });
  });
  el.querySelectorAll("select[data-action='intent-mode']").forEach(select => {
    select.addEventListener("change", (e) => {
      const ri = parseInt(e.target.dataset.ri);
      const ii = parseInt(e.target.dataset.ii);
      updateIntentWire(ri, ii, { mode: e.target.value });
    });
  });
  el.querySelectorAll("input[data-action='intent-above'], input[data-action='intent-below']").forEach(input => {
    input.addEventListener("input", (e) => {
      const ri = parseInt(e.target.dataset.ri);
      const ii = parseInt(e.target.dataset.ii);
      const field = e.target.dataset.action === "intent-above" ? "above" : "below";
      const val = e.target.value.trim();
      updateIntentWire(ri, ii, { [field]: val === "" ? undefined : parseFloat(val) });
    });
  });
  el.querySelectorAll("[data-action='remove-intent']").forEach(btn => {
    btn.addEventListener("click", (e) => {
      const ri = parseInt(e.target.dataset.ri);
      const ii = parseInt(e.target.dataset.ii);
      scene.readings[ri].intents.splice(ii, 1);
      debounceSendScene("readings");
      rebuildReadingEditor();
    });
  });
  el.querySelectorAll("select[data-action='add-intent']").forEach(select => {
    select.addEventListener("change", (e) => {
      let name = e.target.value;
      if (!name) return;
      const ri = parseInt(e.target.dataset.ri);
      if (name === "__new__") {
        name = prompt("Intent name:");
        if (!name || !name.trim()) { e.target.value = ""; return; }
        name = name.trim();
        if (!scene.intents) scene.intents = {};
        if (!scene.intents[name]) {
          scene.intents[name] = { pool: [], deterministic: false };
        }
      }
      if (!scene.readings[ri].intents) scene.readings[ri].intents = [];
      scene.readings[ri].intents.push(name);
      debounceSendScene("readings");
      rebuildReadingEditor();
      rebuildIntentEditor();
    });
  });
  el.querySelectorAll("[data-action='use-template']").forEach(card => {
    card.addEventListener("click", (e) => {
      const ti = parseInt(e.currentTarget.dataset.ti);
      addReadingFromTemplate(READING_TEMPLATES[ti]);
    });
  });
  const addBtn = el.querySelector("[data-action='add-reading']");
  if (addBtn) {
    addBtn.addEventListener("click", () => {
      readingCounter++;
      if (!scene.readings) scene.readings = [];
      scene.readings.push({
        id: `reading-${readingCounter}`,
        mix: {},
        gate: {},
        intents: []
      });
      debounceSendScene("readings");
      rebuildReadingEditor();
    });
  }
}

function onGateInput(e) {
  const input = e.target;
  const ri = parseInt(input.dataset.ri);
  const gq = input.dataset.gq;
  const type = input.dataset.type;
  const r = scene.readings[ri];
  if (!r.gate) r.gate = {};
  if (!r.gate[gq]) r.gate[gq] = {};

  const val = input.value.trim();
  if (val === "") {
    delete r.gate[gq][type === "gate-above" ? "above" : "below"];
    if (Object.keys(r.gate[gq]).length === 0) delete r.gate[gq];
  } else {
    r.gate[gq][type === "gate-above" ? "above" : "below"] = parseFloat(val);
  }
  debounceSendScene("readings");
}

function onTrajectoryInput(e) {
  const input = e.target;
  const ri = parseInt(input.dataset.ri);
  const r = scene.readings[ri];

  const card = input.closest(".editor-group");
  const windowInput = card.querySelector("input[data-type='traj-window']");
  const aboveInput = card.querySelector("input[data-type='traj-above']");
  const belowInput = card.querySelector("input[data-type='traj-below']");

  const windowVal = windowInput.value.trim();
  if (windowVal === "" || parseInt(windowVal) < 2) {
    delete r.trajectory;
  } else {
    if (!r.trajectory) r.trajectory = {};
    r.trajectory.window = parseInt(windowVal);
    const aboveVal = aboveInput.value.trim();
    if (aboveVal === "") { delete r.trajectory.above; } else { r.trajectory.above = parseFloat(aboveVal); }
    const belowVal = belowInput.value.trim();
    if (belowVal === "") { delete r.trajectory.below; } else { r.trajectory.below = parseFloat(belowVal); }
  }
  debounceSendScene("readings");
}

function updateIntentWire(ri, ii, changes) {
  const r = scene.readings[ri];
  let intent = r.intents[ii];
  const name = typeof intent === "string" ? intent : intent.intent;

  if (typeof intent === "string") {
    intent = { intent: name };
  } else {
    intent = { ...intent };
  }

  if (changes.mode !== undefined) {
    if (changes.mode === "continuous") intent.mode = "continuous";
    else delete intent.mode;
  }
  if ("above" in changes) {
    if (changes.above === undefined) delete intent.above;
    else intent.above = changes.above;
  }
  if ("below" in changes) {
    if (changes.below === undefined) delete intent.below;
    else intent.below = changes.below;
  }

  const keys = Object.keys(intent).filter(k => k !== "intent");
  if (keys.length === 0) {
    r.intents[ii] = name;
  } else {
    r.intents[ii] = intent;
  }
  debounceSendScene("readings");
}

function getManifestAction(actionName) {
  if (!manifest || !manifest.actions) return null;
  return manifest.actions.find(a => a.name === actionName) || null;
}

function getManifestActionNames() {
  if (!manifest || !manifest.actions) return [];
  return manifest.actions.map(a => a.name);
}

function renderActionsHTML(name) {
  const entry = scene.intents[name];
  if (!entry) return "";
  const actions = entry.pool || [];
  const deterministic = entry.deterministic || false;
  const totalWeight = actions.reduce((s, a) => s + (a.weight || 1), 0);
  const showWeights = actions.length > 1;

  let html = "";
  if (showWeights) {
    html += `<div class="slider-row">
      <label>Selection: ${deterministic ? "Fixed" : "Random"}</label>
      <input type="checkbox" data-type="intent-det" data-intent="${name}" ${deterministic ? "checked" : ""}>
    </div>`;
  }

  for (let ai = 0; ai < actions.length; ai++) {
    const a = actions[ai];
    const actionName = a.action || "?";
    const weight = a.weight || 1;
    const pct = totalWeight > 0 ? Math.round(weight / totalWeight * 100) : 0;
    const mAction = getManifestAction(actionName);
    const desc = mAction ? mAction.description : "";

    html += `<div class="action-card">`;
    html += `<div class="action-header">
      <span class="action-name">${actionName}</span>
      <span class="action-desc">${desc}</span>
      ${showWeights ? `<span class="action-pct">${pct}%</span>` : ""}
      <button class="remove-btn" data-intent="${name}" data-ai="${ai}" data-action="remove-action" title="Remove action">×</button>
    </div>`;

    if (showWeights) {
      html += `<div class="slider-row">
        <label>weight</label>
        <input type="range" min="1" max="10" step="1" value="${weight}"
          data-type="intent-weight" data-intent="${name}" data-ai="${ai}">
        <span class="slider-val">${weight}</span>
      </div>`;
    }

    if (mAction && mAction.args) {
      html += `<div class="action-args">`;
      for (const [argName, argSchema] of Object.entries(mAction.args)) {
        const currentVal = (a.args && a.args[argName]) || "";
        html += `<div class="arg-row">`;
        html += `<label>${argName}</label>`;
        if (argSchema.type === "enum") {
          html += `<select data-intent="${name}" data-ai="${ai}" data-arg="${argName}" data-action="action-arg">
            <option value="">—</option>
            ${argSchema.values.map(v => `<option value="${v}" ${currentVal === v ? "selected" : ""}>${v}</option>`).join("")}
          </select>`;
        } else if (argSchema.type === "number") {
          html += `<input type="number" value="${currentVal}" placeholder="—"
            data-intent="${name}" data-ai="${ai}" data-arg="${argName}" data-action="action-arg">`;
        } else {
          html += `<input type="text" value="${currentVal}" placeholder="—"
            data-intent="${name}" data-ai="${ai}" data-arg="${argName}" data-action="action-arg">`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }

    html += `</div>`;
  }

  const availableActions = getManifestActionNames();
  if (availableActions.length > 0) {
    html += `<div class="add-row">
      <select data-intent="${name}" data-action="add-action">
        <option value="">+ add action</option>
        ${availableActions.map(a => `<option value="${a}">${a}</option>`).join("")}
      </select>
    </div>`;
  }
  return html;
}

function getIntentUsageCounts() {
  const counts = {};
  for (const r of (scene.readings || [])) {
    for (const intent of (r.intents || [])) {
      const name = typeof intent === "string" ? intent : intent.intent;
      counts[name] = (counts[name] || 0) + 1;
    }
  }
  return counts;
}

function getIntentUsageReadings(intentName) {
  const result = [];
  for (const r of (scene.readings || [])) {
    for (const intent of (r.intents || [])) {
      const name = typeof intent === "string" ? intent : intent.intent;
      if (name === intentName) {
        result.push(r.id);
        break;
      }
    }
  }
  return result;
}

function attachActionListeners(el) {
  el.querySelectorAll("input[type=range][data-type='intent-weight']").forEach(input => {
    input.addEventListener("input", onIntentSlider);
  });
  el.querySelectorAll("input[type=checkbox][data-type='intent-det']").forEach(input => {
    input.addEventListener("change", onIntentCheckbox);
  });
  el.querySelectorAll("[data-action='remove-action']").forEach(btn => {
    btn.addEventListener("click", (e) => {
      const name = e.target.dataset.intent;
      const ai = parseInt(e.target.dataset.ai);
      scene.intents[name].pool.splice(ai, 1);
      debounceSendScene("intents");
      rebuildEditor();
    });
  });
  el.querySelectorAll("select[data-action='add-action']").forEach(select => {
    select.addEventListener("change", (e) => {
      const actionName = e.target.value;
      if (!actionName) return;
      const name = e.target.dataset.intent;
      scene.intents[name].pool.push({ action: actionName, weight: 1, args: {} });
      debounceSendScene("intents");
      rebuildEditor();
    });
  });
  el.querySelectorAll("[data-action='action-arg']").forEach(input => {
    input.addEventListener("input", (e) => {
      const name = e.target.dataset.intent;
      const ai = parseInt(e.target.dataset.ai);
      const argName = e.target.dataset.arg;
      const val = e.target.value;
      const action = scene.intents[name].pool[ai];
      if (!action.args) action.args = {};
      if (val === "") delete action.args[argName];
      else action.args[argName] = e.target.type === "number" ? parseFloat(val) : val;
      debounceSendScene("intents");
    });
  });
  el.querySelectorAll("select[data-action='action-arg']").forEach(select => {
    select.addEventListener("change", (e) => {
      const name = e.target.dataset.intent;
      const ai = parseInt(e.target.dataset.ai);
      const argName = e.target.dataset.arg;
      const val = e.target.value;
      const action = scene.intents[name].pool[ai];
      if (!action.args) action.args = {};
      if (val === "") delete action.args[argName];
      else action.args[argName] = val;
      debounceSendScene("intents");
    });
  });
}

function rebuildIntentEditor() {
  const el = document.getElementById("intent-editor");
  const intents = scene.intents || {};
  const intentNames = Object.keys(intents);

  for (const name of intentNames) {
    if (Array.isArray(intents[name])) {
      scene.intents[name] = { pool: intents[name], deterministic: false };
    }
  }

  const usageCounts = getIntentUsageCounts();

  if (intentNames.length === 0) {
    el.innerHTML = `<div class="empty-hint">No intents yet — add one from a reading card above, or create one below</div>
      <div style="margin-top:8px;">
        <button class="add-btn" data-action="add-intent-standalone">+ Add Intent</button>
      </div>`;
    el.querySelector("[data-action='add-intent-standalone']").addEventListener("click", onAddIntentStandalone);
    return;
  }

  let html = "";
  for (const name of intentNames) {
    const usageReadings = getIntentUsageReadings(name);

    html += `<div class="editor-group" data-intent-name="${name}">`;
    html += `<div class="intent-card">`;

    html += `<div class="intent-card-header">`;
    html += `<div class="editor-group-title">Intent:</div>`;
    html += `<input type="text" class="intent-name-input" value="${name}" data-intent="${name}" data-action="rename-intent">`;
    html += `<button class="remove-btn" data-intent="${name}" data-action="remove-intent-card" title="Remove intent">×</button>`;
    html += `</div>`;

    if (usageReadings.length > 0) {
      html += `<div class="intent-usage-badges">`;
      for (const rid of usageReadings) {
        html += `<span class="intent-usage-badge" onclick="scrollToReadingCard('${rid}')" title="Jump to reading">${rid}</span>`;
      }
      html += `</div>`;
    }

    html += renderActionsHTML(name);

    html += `</div>`;
    html += `</div>`;
  }

  html += `<div style="margin-top:8px;">
    <button class="add-btn" data-action="add-intent-standalone">+ Add Intent</button>
  </div>`;

  el.innerHTML = html;

  attachActionListeners(el);

  el.querySelectorAll("[data-action='rename-intent']").forEach(input => {
    input.addEventListener("change", (e) => {
      const oldName = e.target.dataset.intent;
      const newName = e.target.value.trim();
      if (!newName || newName === oldName) {
        e.target.value = oldName;
        return;
      }
      if (scene.intents[newName]) {
        alert("An intent with that name already exists.");
        e.target.value = oldName;
        return;
      }
      scene.intents[newName] = scene.intents[oldName];
      delete scene.intents[oldName];
      for (const r of (scene.readings || [])) {
        if (!r.intents) continue;
        for (let i = 0; i < r.intents.length; i++) {
          const intent = r.intents[i];
          if (typeof intent === "string" && intent === oldName) {
            r.intents[i] = newName;
          } else if (typeof intent === "object" && intent.intent === oldName) {
            intent.intent = newName;
          }
        }
      }
      debounceSendScene("intents");
      rebuildEditor();
    });
  });

  el.querySelectorAll("[data-action='remove-intent-card']").forEach(btn => {
    btn.addEventListener("click", (e) => {
      const name = e.target.dataset.intent;
      const usageReadings = getIntentUsageReadings(name);
      if (usageReadings.length > 0) {
        if (!confirm(`"${name}" is used by ${usageReadings.length} reading(s): ${usageReadings.join(", ")}. Remove it and all references?`)) return;
        for (const r of (scene.readings || [])) {
          if (!r.intents) continue;
          r.intents = r.intents.filter(intent => {
            const n = typeof intent === "string" ? intent : intent.intent;
            return n !== name;
          });
        }
      }
      delete scene.intents[name];
      debounceSendScene("intents");
      rebuildEditor();
    });
  });

  el.querySelector("[data-action='add-intent-standalone']").addEventListener("click", onAddIntentStandalone);
}

function onAddIntentStandalone() {
  const name = prompt("Intent name:");
  if (!name || !name.trim()) return;
  const trimmed = name.trim();
  if (!scene.intents) scene.intents = {};
  if (scene.intents[trimmed]) {
    alert("An intent with that name already exists.");
    return;
  }
  scene.intents[trimmed] = { pool: [], deterministic: false };
  debounceSendScene("intents");
  rebuildIntentEditor();
}

function onReadingSlider(e) {
  const input = e.target;
  const val = parseFloat(input.value);
  input.nextElementSibling.textContent = val.toFixed(2);

  const ri = parseInt(input.dataset.ri);
  const type = input.dataset.type;

  if (type === "mix") {
    const q = input.dataset.quality;
    const mix = scene.readings[ri].mix;
    if (typeof mix[q] === "number") {
      mix[q] = val;
    } else if (mix[q] && mix[q].weight !== undefined) {
      mix[q].weight = val;
    }
  } else if (type === "gate-above") {
    const gq = input.dataset.gq;
    scene.readings[ri].gate[gq].above = val;
  } else if (type === "gate-below") {
    const gq = input.dataset.gq;
    scene.readings[ri].gate[gq].below = val;
  }

  debounceSendScene("readings");
}

function onIntentSlider(e) {
  const input = e.target;
  const val = parseInt(input.value);
  input.nextElementSibling.textContent = val;

  const name = input.dataset.intent;
  const ai = parseInt(input.dataset.ai);
  const action = scene.intents[name].pool[ai];
  if (action) action.weight = val;

  debounceSendScene("intents");
}

function onIntentCheckbox(e) {
  const input = e.target;
  const name = input.dataset.intent;
  scene.intents[name].deterministic = input.checked;
  const label = input.parentElement.querySelector("label");
  if (label) label.textContent = `Selection: ${input.checked ? "Fixed" : "Random"}`;
  debounceSendScene("intents");
}

function debounceSendScene(section) {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    const patch = {};
    if (scene.readings) patch.readings = scene.readings;
    if (scene.intents) patch.intents = scene.intents;
    if (scene.settings) patch.settings = scene.settings;
    send({ type: "updateScene", patch });
  }, DEBOUNCE_MS);
}

function updateScenePicker(names) {
  const picker = document.getElementById("scene-picker");
  const current = scene ? scene.name : "";
  picker.innerHTML = names.map(n =>
    `<option value="${n}"${n === current ? " selected" : ""}>${n}</option>`
  ).join("");
}

function switchScene(name) {
  if (!name) return;
  send({ type: "switchScene", name });
}

function saveSceneAs() {
  const name = prompt("Save scene as:", scene ? scene.name + "-copy" : "new-scene");
  if (!name) return;
  const sanitized = name.replace(/[^a-zA-Z0-9_-]/g, "-");
  send({ type: "saveSceneAs", name: sanitized });
  const btn = document.getElementById("save-as-btn");
  btn.classList.add("flash");
  btn.textContent = "Saved!";
  setTimeout(() => {
    btn.classList.remove("flash");
    btn.textContent = "Save As…";
  }, 1200);
}

function revertScene() {
  send({ type: "reloadScene" });
  const btn = document.getElementById("revert-btn");
  btn.classList.add("flash");
  btn.textContent = "Reverted!";
  setTimeout(() => {
    btn.classList.remove("flash");
    btn.textContent = "Revert";
  }, 1200);
}

function saveScene() {
  send({ type: "saveScene" });
  const btn = document.getElementById("save-btn");
  btn.classList.add("flash");
  btn.textContent = "Saved!";
  setTimeout(() => {
    btn.classList.remove("flash");
    btn.textContent = "Save";
  }, 1200);
}

// Keyboard shortcuts
document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "s") {
    e.preventDefault();
    saveScene();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === "z") {
    e.preventDefault();
    revertScene();
  }
});

// ─── Init ────────────────────────────────────────────────────────────────────
requestAnimationFrame(renderLoop);
connect();
</script>
